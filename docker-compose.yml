

services:
  # Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: helpdesk-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=HelpDesk123!@#
      - MSSQL_PID=Developer
    ports:
      - "${SQLSERVER_HOST_PORT:-14333}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - helpdesk-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: helpdesk-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - helpdesk-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # API Application
  api:
    build:
      context: .
      dockerfile: HelpDeskSystem.API/Dockerfile
    container_name: helpdesk-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - SeedData__Enabled=false
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=HelpDeskSystem;User Id=sa;Password=HelpDesk123!@#;TrustServerCertificate=true;MultipleActiveResultSets=true
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__SecretKey=YourSuperSecretKeyHere12345678901234567890
      - JwtSettings__Issuer=HelpDeskSystem
      - JwtSettings__Audience=HelpDeskSystem.API
      - JwtSettings__AccessTokenExpiration=3600
      - JwtSettings__RefreshTokenExpiration=604800
      - TwilioOptions__AccountSid=your_twilio_sid
      - TwilioOptions__AuthToken=your_twilio_token
      - TwilioOptions__DefaultPhoneNumber=+1234567890
      - TwilioOptions__WebhookBaseUrl=https://yourdomain.com
      - WhatsAppOptions__AccessToken=your_whatsapp_access_token
      - WhatsAppOptions__PhoneNumberId=your_phone_number_id
      - WhatsAppOptions__BusinessAccountId=your_business_account_id
      - WhatsAppOptions__WebhookVerifyToken=your_webhook_verify_token
      - TeamsOptions__AccessToken=your_teams_access_token
      - SlackOptions__BotToken=your_slack_bot_token
      - SlackOptions__SigningSecret=your_slack_signing_secret
      - Logging__LogLevel__Default=Information
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      - Logging__LogLevel__Microsoft.EntityFrameworkCore=Warning
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      - sqlserver
      - redis
    networks:
      - helpdesk-network
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

  # Web Application
  web:
    build:
      context: ./HelpDeskSystem.Web
      dockerfile: Dockerfile
    container_name: helpdesk-web
    environment:
      - REACT_APP_API_URL=/api
      - REACT_APP_ENVIRONMENT=production
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - helpdesk-network
    restart: unless-stopped

  # Hangfire Dashboard (Background Job Processing)
  hangfire:
    build:
      context: .
      dockerfile: HelpDeskSystem.API/Dockerfile
    container_name: helpdesk-hangfire
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - SeedData__Enabled=false
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=HelpDeskSystem;User Id=sa;Password=HelpDesk123!@#;TrustServerCertificate=true;MultipleActiveResultSets=true
      - ConnectionStrings__Redis=redis:6379
      - HangfireSettings__DashboardEnabled=true
      - HangfireSettings__WorkerCount=5
      - Logging__LogLevel__Default=Information
    ports:
      - "5002:80"
    depends_on:
      - sqlserver
      - redis
    networks:
      - helpdesk-network
    restart: unless-stopped
    command: dotnet HelpDeskSystem.API.dll --environment Hangfire
    volumes:
      - ./logs:/app/logs

  # Nginx Reverse Proxy - Temporarily disabled
  # nginx:
  #   image: nginx:alpine
  #   container_name: helpdesk-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./nginx/ssl:/etc/nginx/ssl
  #   depends_on:
  #     - api
  #     - web
  #   networks:
  #     - helpdesk-network
  #   restart: unless-stopped

volumes:
  sqlserver_data:
  redis_data:

networks:
  helpdesk-network:
    driver: bridge
