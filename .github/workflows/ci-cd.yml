name: CI-CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore backend
        run: |
          dotnet restore HelpDeskSystem.API/HelpDeskSystem.API.csproj
          dotnet restore HelpDeskSystem.Tests/HelpDeskSystem.Tests.csproj

      - name: Build backend
        run: dotnet build HelpDeskSystem.API/HelpDeskSystem.API.csproj --configuration Release --no-restore

      - name: Test backend
        run: dotnet test HelpDeskSystem.Tests/HelpDeskSystem.Tests.csproj --configuration Release --no-restore

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: HelpDeskSystem.Web
        run: npm ci

      - name: Build frontend
        working-directory: HelpDeskSystem.Web
        run: npm run build

  docker:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: HelpDeskSystem.API/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/helpdesk-api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./HelpDeskSystem.Web
          file: ./HelpDeskSystem.Web/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/helpdesk-web:latest
